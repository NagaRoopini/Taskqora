<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments :: head('Project Details - taskqora')}"></head>
<body>
    <aside th:replace="~{fragments :: sidebar('projects', ${user.role})}"></aside>
    
    <main class="main-content">
        <!-- Top Bar -->
        <div class="top-bar">
            <div class="top-bar-left">
            </div>
            <div class="top-bar-actions">
                <div class="notif-btn">
                    <i class="fas fa-bell"></i>
                    <span class="notif-badge">0</span>
                </div>
                <div class="user-profile-top">
                    <div class="user-avatar-mini" th:text="${user.name.substring(0,1).toUpperCase()}">U</div>
                    <div class="user-info">
                        <span class="user-name" th:text="${user.name}">User</span>
                        <span class="user-role" th:text="${user.role}">Role</span>
                    </div>
                </div>
            </div>
        </div>

        <div class="dashboard-page">
            <header class="page-header">
                <div class="header-text">
                    <h1 th:text="${project.title}">Project Title</h1>
                    <p style="font-size: 0.85rem; color: var(--text-muted);">
                        <a th:href="@{/dashboard}" style="color: var(--primary); text-decoration: none;">Dashboard</a> 
                        <span style="margin: 0 0.5rem;">&gt;</span> 
                        <a th:href="@{/projects}" style="color: var(--primary); text-decoration: none;">Projects</a>
                        <span style="margin: 0 0.5rem;">&gt;</span> Project Details
                    </p>
                </div>
                <!-- Edit Project Button Removed for Read-Only View -->
            </header>

            <div class="content-grid" style="grid-template-columns: 2fr 1fr; gap: 2rem;">
                <!-- Left: Overview & Description -->
                <div class="side-card" style="padding: 2.5rem;">
                    <div style="display: flex; align-items: center; gap: 1rem; margin-bottom: 2rem;">
                        <div style="width: 48px; height: 48px; background: #f1f5f9; color: var(--primary); border-radius: 12px; display: flex; align-items: center; justify-content: center; font-size: 1.5rem;">
                            <i class="fas fa-project-diagram"></i>
                        </div>
                        <div>
                            <h4 style="margin: 0; font-weight: 800; font-size: 1.25rem;">Project Overview</h4>
                            <span class="badge" th:classappend="${project.status == 'Completed' ? 'badge-completed' : (project.status == 'On Hold' ? 'badge-on_hold' : 'badge-in_progress')}" 
                                  th:text="${project.status}" style="margin-top: 0.25rem; display: inline-block;">STATUS</span>
                        </div>
                    </div>

                    <div style="margin-bottom: 2.5rem;">
                        <h5 style="font-weight: 700; color: var(--text-main); margin-bottom: 0.75rem;">Description</h5>
                        <p style="color: var(--text-muted); line-height: 1.7; font-size: 0.95rem;" th:text="${project.description ?: 'No description provided for this project.'}">Project description...</p>
                    </div>

                    <div style="display: grid; grid-template-columns: repeat(3, 1fr); gap: 1.5rem; padding: 1.5rem; background: #f8fafc; border-radius: 16px;">
                        <div>
                            <span style="display: block; font-size: 0.75rem; font-weight: 700; color: var(--text-muted); text-transform: uppercase; margin-bottom: 0.5rem;">Category</span>
                            <span style="font-weight: 700; color: var(--text-main);" th:text="${project.category ?: 'Uncategorized'}">Category</span>
                        </div>
                        <div>
                            <span style="display: block; font-size: 0.75rem; font-weight: 700; color: var(--text-muted); text-transform: uppercase; margin-bottom: 0.5rem;">Priority</span>
                            <span class="badge" th:classappend="${project.priority == 'High' ? 'badge-danger' : (project.priority == 'Medium' ? 'badge-warning' : 'badge-success')}" 
                                  th:text="${project.priority ?: 'Low'}">PRIORITY</span>
                        </div>
                        <div>
                            <span style="display: block; font-size: 0.75rem; font-weight: 700; color: var(--text-muted); text-transform: uppercase; margin-bottom: 0.5rem;">Created By</span>
                            <div style="display: flex; align-items: center; gap: 0.5rem;">
                                <div class="user-avatar-mini" style="width: 24px; height: 24px; font-size: 0.65rem;" th:text="${project.createdBy != null ? project.createdBy.name.substring(0,1).toUpperCase() : 'S'}">S</div>
                                <span style="font-weight: 700; color: var(--text-main); font-size: 0.9rem;" th:text="${project.createdBy != null ? project.createdBy.name : 'System'}">User</span>
                            </div>
                        </div>
                    </div>
                </div>

                <!-- Right: Timeline & Progress -->
                <div class="side-card" style="padding: 2.5rem;">
                    <h4 style="margin-bottom: 2rem; font-weight: 800;">Timeline</h4>
                    
                    <div style="display: flex; flex-direction: column; gap: 1.5rem; margin-bottom: 2.5rem;">
                        <div style="display: flex; align-items: center; gap: 1rem;">
                            <div style="width: 36px; height: 36px; background: #ecfdf5; color: #10b981; border-radius: 10px; display: flex; align-items: center; justify-content: center;">
                                <i class="far fa-calendar-check"></i>
                            </div>
                            <div>
                                <span style="display: block; font-size: 0.75rem; font-weight: 700; color: var(--text-muted);">START DATE</span>
                                <span style="font-weight: 700; color: var(--text-main);" th:text="${#temporals.format(project.startDate, 'dd MMMM yyyy')}">Start</span>
                            </div>
                        </div>
                        <div style="display: flex; align-items: center; gap: 1rem;">
                            <div style="width: 36px; height: 36px; background: #fff1f2; color: #f43f5e; border-radius: 10px; display: flex; align-items: center; justify-content: center;">
                                <i class="far fa-calendar-times"></i>
                            </div>
                            <div>
                                <span style="display: block; font-size: 0.75rem; font-weight: 700; color: var(--text-muted);">DUE DATE</span>
                                <span style="font-weight: 700; color: var(--text-main);" th:text="${project.endDate != null ? #temporals.format(project.endDate, 'dd MMMM yyyy') : 'No Deadline'}">End</span>
                            </div>
                        </div>
                    </div>

                    <h4 style="margin-bottom: 1rem; font-weight: 800;">Overall Progress</h4>
                    <div style="background: #f1f5f9; border-radius: 12px; height: 12px; margin-bottom: 1rem; overflow: hidden;">
                        <div th:style="'width: ' + ${project.status == 'Completed' ? '100%' : '35%'} + '; height: 100%; background: linear-gradient(90deg, var(--primary), #818cf8); border-radius: 12px;'"></div>
                    </div>
                    <div style="display: flex; justify-content: space-between; align-items: center;">
                        <span style="font-weight: 800; font-size: 1.5rem; color: var(--text-main);" th:text="${project.status == 'Completed' ? '100%' : '35%'}">0%</span>
                        <span style="color: var(--text-muted); font-weight: 600; font-size: 0.85rem;">Project Completion</span>
                    </div>
                </div>
            </div>

        </div>
    </main>
</body>
</html>
