<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments :: head('Forgot Password')}"></head>
<body>
    <div class="login-split-wrapper">
        <div class="login-left">
            <div class="login-logo">
                <i class="fas fa-layer-group"></i> taskqora
            </div>
            <div class="login-welcome-text">
                <h2>Reset Your <span>Password</span></h2>
                <p>Don't worry! It happens. Please enter your email to receive a verification OTP.</p>
            </div>
            <div class="login-illustration">
                <img th:src="@{/images/login-illustration.png}" alt="Reset Password">
            </div>
        </div>

        <div class="login-right">
            <div class="login-form-card">
                <div class="back-to-login">
                    <a th:href="@{/login}"><i class="fas fa-arrow-left"></i> Back to Login</a>
                </div>
                
                <header class="login-form-header">
                    <h1>Forgot <span>Password?</span></h1>
                    <p>Enter your registered email below to receive a password reset code.</p>
                </header>

                <div th:if="${error}" class="alert-box alert-error" th:text="${error}"></div>
                <div th:if="${message}" class="alert-box alert-success" th:text="${message}"></div>

                <form th:action="@{/forgot-password}" method="post">
                    <div class="login-input-group">
                        <label>Email Address</label>
                        <i class="fas fa-envelope field-icon"></i>
                        <input type="email" name="email" class="form-input" placeholder="e.g. name@company.com" required autofocus>
                    </div>

                    <button type="submit" class="login-btn">
                        Send Reset Code <i class="fas fa-paper-plane ms-2"></i>
                    </button>
                </form>

            </div>
        </div>
    </div>
</body>
</html>
