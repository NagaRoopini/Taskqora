<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments :: head('Reset Password')}"></head>
<body>
    <div class="login-split-wrapper">
        <div class="login-left">
            <div class="login-logo">
                <i class="fas fa-layer-group"></i> taskqora
            </div>
            <div class="login-welcome-text">
                <h2>Set New <span>Password</span></h2>
                <p>You're almost there! Choose a strong password to secure your account.</p>
            </div>
            <div class="login-illustration">
                <img th:src="@{/images/login-illustration.png}" alt="Reset Password">
            </div>
        </div>

        <div class="login-right">
            <div class="login-form-card">
                <header class="login-form-header">
                    <h1>New <span>Password</span></h1>
                    <p>Almost there! Create a strong password to secure your account.</p>
                </header>

                <div th:if="${error}" class="alert-box alert-error" th:text="${error}"></div>

                <form th:action="@{/reset-password}" method="post">
                    <div class="login-input-group">
                        <label>New Password</label>
                        <i class="fas fa-lock field-icon"></i>
                        <input type="password" name="password" id="password" class="form-input" placeholder="Min. 8 characters" required autofocus>
                        <i class="fas fa-eye toggle-password" onclick="togglePassword('password', this)"></i>
                    </div>
                    
                    <div class="login-input-group">
                        <label>Confirm Password</label>
                        <i class="fas fa-lock field-icon"></i>
                        <input type="password" name="confirmPassword" id="confirmPassword" class="form-input" placeholder="Repeat new password" required>
                        <i class="fas fa-eye toggle-password" onclick="togglePassword('confirmPassword', this)"></i>
                    </div>

                    <button type="submit" class="login-btn">
                        Reset Password <i class="fas fa-shield-check ms-2"></i>
                    </button>
                </form>
            </div>
        </div>
    </div>

    <script>
        function togglePassword(fieldId, icon) {
            const passwordField = document.getElementById(fieldId);
            if (passwordField.type === 'password') {
                passwordField.type = 'text';
                icon.classList.remove('fa-eye');
                icon.classList.add('fa-eye-slash');
            } else {
                passwordField.type = 'password';
                icon.classList.remove('fa-eye-slash');
                icon.classList.add('fa-eye');
            }
        }
    </script>
</body>
</html>
