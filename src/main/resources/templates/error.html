<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Error - Taskqora</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #f8f9fa; display: flex; align-items: center; justify-content: center; height: 100vh; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        .error-card { max-width: 500px; width: 100%; padding: 2rem; border-radius: 15px; background: white; box-shadow: 0 10px 30px rgba(0,0,0,0.1); text-align: center; }
        .error-code { font-size: 4rem; font-weight: bold; color: #dc3545; }
        .error-message { font-size: 1.2rem; margin-bottom: 2rem; color: #6c757d; }
    </style>
</head>
<body>
    <div class="error-card">
        <div class="error-code">Oops!</div>
        <h3>Something went wrong</h3>
        <p class="error-message" th:text="${error != null ? error : 'An unexpected error occurred. Please try again later.'}"></p>
        <a href="/dashboard" class="btn btn-primary px-4">Go to Dashboard</a>
    </div>
</body>
</html>
