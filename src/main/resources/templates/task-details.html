<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments :: head('Task Details - taskqora')}"></head>
<body>
    <aside th:replace="~{fragments :: sidebar('tasks', ${user.role})}"></aside>
    
    <main class="main-content">
        <!-- Top Bar -->
        <div class="top-bar">
            <div class="top-bar-left">
            </div>
            <div class="top-bar-actions">
                <div class="notif-btn">
                    <i class="fas fa-bell"></i>
                    <span class="notif-badge">0</span>
                </div>
                <div class="user-profile-top">
                    <div class="user-avatar-mini" th:text="${user.name.substring(0,1).toUpperCase()}">U</div>
                    <div class="user-info">
                        <span class="user-name" th:text="${user.name}">User</span>
                        <span class="user-role" th:text="${user.role}">Role</span>
                    </div>
                </div>
            </div>
        </div>

        <div class="dashboard-page">
            <header class="page-header">
                <div class="header-text">
                    <h1 th:text="${task.title}">Task Title</h1>
                    <p style="font-size: 0.85rem; color: var(--text-muted);">
                        <a th:href="@{/dashboard}" style="color: var(--primary); text-decoration: none;">Dashboard</a> 
                        <span style="margin: 0 0.5rem;">&gt;</span> 
                        <a th:href="@{/tasks}" style="color: var(--primary); text-decoration: none;">Tasks</a>
                        <span style="margin: 0 0.5rem;">&gt;</span> Task Details
                    </p>
                </div>
            </header>

            <div class="content-grid" style="grid-template-columns: 2fr 1fr; gap: 2rem;">
                <!-- Left: Overview -->
                <div class="side-card" style="padding: 2.5rem;">
                    <div style="display: flex; align-items: center; gap: 1rem; margin-bottom: 2.5rem;">
                        <div style="width: 48px; height: 48px; background: #eef2ff; color: var(--primary); border-radius: 12px; display: flex; align-items: center; justify-content: center; font-size: 1.5rem;">
                            <i class="fas fa-list-check"></i>
                        </div>
                        <div>
                            <h4 style="margin: 0; font-weight: 800; font-size: 1.25rem;">Task Description</h4>
                            <span class="badge" th:classappend="'status-' + ${task.status.toLowerCase().replace(' ', '_')}" 
                                  th:text="${task.status}" style="margin-top: 0.25rem; display: inline-block;">STATUS</span>
                        </div>
                    </div>

                    <div style="margin-bottom: 3rem;">
                        <p style="color: var(--text-main); line-height: 1.8; font-size: 1rem; white-space: pre-line;" 
                           th:text="${task.description ?: 'No description provided for this task.'}">Task description...</p>
                    </div>

                    <div style="display: grid; grid-template-columns: repeat(2, 1fr); gap: 2rem; padding: 2rem; background: #f8fafc; border-radius: 20px; border: 1px solid var(--border-color);">
                        <div>
                            <span style="display: block; font-size: 0.75rem; font-weight: 700; color: var(--text-muted); text-transform: uppercase; margin-bottom: 0.75rem;">Project</span>
                            <div style="display: flex; align-items: center; gap: 0.75rem;">
                                <div style="width: 32px; height: 32px; background: white; border: 1px solid var(--border-color); border-radius: 8px; display: flex; align-items: center; justify-content: center; color: var(--primary);">
                                    <i class="fas fa-folder"></i>
                                </div>
                                <span style="font-weight: 800; color: var(--text-main);" th:text="${task.project != null ? task.project.title : 'No Project'}">Project</span>
                            </div>
                        </div>
                        <div>
                            <span style="display: block; font-size: 0.75rem; font-weight: 700; color: var(--text-muted); text-transform: uppercase; margin-bottom: 0.75rem;">Assigned To</span>
                            <div style="display: flex; align-items: center; gap: 0.75rem;">
                                <div class="user-avatar-mini" th:text="${task.assignedTo != null ? task.assignedTo.name.substring(0,1).toUpperCase() : '?'}">?</div>
                                <span style="font-weight: 800; color: var(--text-main);" th:text="${task.assignedTo != null ? task.assignedTo.name : 'Unassigned'}">User</span>
                            </div>
                        </div>
                    </div>
                </div>

                <!-- Right: Metadata -->
                <div class="side-card" style="padding: 2.5rem;">
                    <h4 style="margin-bottom: 2rem; font-weight: 800;">Task Details</h4>
                    
                    <div style="display: flex; flex-direction: column; gap: 1.5rem;">
                        <div style="padding: 1rem; background: #fcfdfe; border-radius: 12px; border: 1px solid var(--border-color);">
                            <span style="display: block; font-size: 0.7rem; font-weight: 800; color: var(--text-muted); margin-bottom: 0.5rem; text-transform: uppercase;">Priority</span>
                            <span class="badge" th:classappend="${task.priority == 'High' || task.priority == 'Critical' ? 'badge-danger' : (task.priority == 'Medium' ? 'badge-warning' : 'badge-success')}" 
                                  th:text="${task.priority}" style="font-size: 0.85rem; padding: 0.5rem 1rem;">PRIORITY</span>
                        </div>

                        <div style="padding: 1rem; background: #fcfdfe; border-radius: 12px; border: 1px solid var(--border-color);">
                            <span style="display: block; font-size: 0.7rem; font-weight: 800; color: var(--text-muted); margin-bottom: 0.5rem; text-transform: uppercase;">Due Date</span>
                            <div style="display: flex; align-items: center; gap: 0.75rem;">
                                <i class="far fa-calendar-alt" style="color: #64748b;"></i>
                                <span style="font-weight: 800; color: var(--text-main);" th:text="${task.dueDate}">Due Date</span>
                            </div>
                        </div>

                        <div style="padding: 1rem; background: #fcfdfe; border-radius: 12px; border: 1px solid var(--border-color);">
                            <span style="display: block; font-size: 0.7rem; font-weight: 800; color: var(--text-muted); margin-bottom: 0.5rem; text-transform: uppercase;">Last Updated</span>
                            <div style="display: flex; align-items: center; gap: 0.75rem;">
                                <i class="far fa-clock" style="color: #64748b;"></i>
                                <span style="font-weight: 600; color: var(--text-muted);">Just now</span>
                            </div>
                        </div>
                    </div>

                        <div style="padding: 1rem; background: #fcfdfe; border-radius: 12px; border: 1px solid var(--border-color);">
                            <span style="display: block; font-size: 0.7rem; font-weight: 800; color: var(--text-muted); margin-bottom: 0.75rem; text-transform: uppercase;">Progress</span>
                            <div style="width: 100%; height: 8px; background: #e2e8f0; border-radius: 4px; overflow: hidden; margin-bottom: 0.5rem;">
                                <div th:style="'width: ' + ${task.progress} + '%; height: 100%; background: var(--primary); transition: width 0.3s ease;'"></div>
                            </div>
                            <span style="font-weight: 800; color: var(--primary); font-size: 0.85rem;" th:text="${task.progress} + '%'">0%</span>
                        </div>
                    </div>

                    <!-- Progress Update Section (Admin or Assigned User Only) -->
                    <div th:if="${user.role == 'ADMIN' || (task.assignedTo != null && task.assignedTo.id == user.id)}" 
                         style="margin-top: 2.5rem; padding-top: 2.5rem; border-top: 1px solid var(--border-color);">
                        <h4 style="margin-bottom: 1.5rem; font-weight: 800; font-size: 1rem;">Update Progress</h4>
                        <form th:action="@{'/tasks/status/' + ${task.id}}" method="POST">
                            <div style="margin-bottom: 1.25rem;">
                                <label style="display: block; font-size: 0.75rem; font-weight: 800; color: var(--text-muted); margin-bottom: 0.5rem;">STATUS</label>
                                <select name="status" class="form-select-premium" style="height: 45px;">
                                    <option value="PENDING" th:selected="${task.status == 'PENDING'}">Pending</option>
                                    <option value="IN_PROGRESS" th:selected="${task.status == 'IN_PROGRESS'}">In Progress</option>
                                    <option value="REVIEW" th:selected="${task.status == 'REVIEW'}">Review</option>
                                    <option value="COMPLETED" th:selected="${task.status == 'COMPLETED'}">Completed</option>
                                </select>
                            </div>
                            <div style="margin-bottom: 1.25rem;">
                                <label style="display: block; font-size: 0.75rem; font-weight: 800; color: var(--text-muted); margin-bottom: 0.5rem;">PROGRESS (%)</label>
                                <input type="number" name="progress" th:value="${task.progress}" min="0" max="100" 
                                       class="form-select-premium" style="height: 45px; padding: 0 1rem;">
                            </div>
                            <div style="margin-bottom: 1.5rem;">
                                <label style="display: block; font-size: 0.75rem; font-weight: 800; color: var(--text-muted); margin-bottom: 0.5rem;">UPDATE NOTES</label>
                                <textarea name="progressNotes" class="form-select-premium" style="height: 100px; padding: 1rem; resize: none;" 
                                          placeholder="Describe your progress..."></textarea>
                            </div>
                            <button type="submit" class="btn-premium" style="width: 100%; padding: 1rem;">Save Changes</button>
                        </form>
                    </div>
                </div>
            </div>

            <!-- Progress History / Notes display -->
            <div th:if="${task.progressNotes != null && !task.progressNotes.isEmpty()}" class="side-card" style="margin-top: 2rem; padding: 2.5rem;">
                <h4 style="margin-bottom: 1.5rem; font-weight: 800;">Member Notes</h4>
                <div style="padding: 1.5rem; background: #f8fafc; border-radius: 16px; border-left: 4px solid var(--primary);">
                    <p style="margin: 0; color: var(--text-main); font-size: 0.95rem; line-height: 1.6;" th:text="${task.progressNotes}"></p>
                </div>
            </div>
        </div>
    </main>

    <style>
        .badge-status.status-pending { background: #fef3c7; color: #d97706; }
        .badge-status.status-in_progress { background: #dbeafe; color: #2563eb; }
        .badge-status.status-review { background: #f3e8ff; color: #9333ea; }
        .badge-status.status-completed { background: #dcfce7; color: #16a34a; }
        
        .form-select-premium {
            width: 100%;
            padding: 0 1rem;
            border-radius: 8px;
            border: 1px solid var(--border-color);
            background: white;
            font-weight: 700;
            cursor: pointer;
            outline: none;
        }
    </style>
</body>
</html>
