<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments :: head('Verify OTP')}"></head>
<body>
    <div class="login-split-wrapper">
        <div class="login-left">
            <div class="login-logo">
                <i class="fas fa-layer-group"></i> taskqora
            </div>
            <div class="login-welcome-text">
                <h2>Verify <span>Identity</span></h2>
                <p>We've sent a 6-digit verification code to your email. Please enter it below.</p>
            </div>
            <div class="login-illustration">
                <img th:src="@{/images/login-illustration.png}" alt="Verify OTP">
            </div>
        </div>

        <div class="login-right">
            <div class="login-form-card">
                <div class="back-to-login">
                    <a th:href="@{/forgot-password}"><i class="fas fa-arrow-left"></i> Change Email</a>
                </div>

                <header class="login-form-header">
                    <h1>Verify <span>OTP</span></h1>
                    <p>Enter the 6-digit code sent to <strong th:text="${email}"></strong></p>
                </header>

                <div th:if="${error}" class="alert-box alert-error" th:text="${error}"></div>
                <div th:if="${message}" class="alert-box alert-success" th:text="${message}"></div>

                <form th:action="@{/verify-otp}" method="post">
                    <input type="hidden" name="email" th:value="${email}">
                    <div class="login-input-group">
                        <label>Security Code</label>
                        <i class="fas fa-shield-halved field-icon"></i>
                        <input type="text" name="otp" class="form-input otp-input" placeholder="0 0 0 0 0 0" maxlength="6" required autofocus>
                    </div>

                    <button type="submit" class="login-btn">
                        Verify Identity <i class="fas fa-check-circle ms-2"></i>
                    </button>
                </form>

                <footer class="auth-footer">
                    Didn't receive code? <a href="javascript:void(0)" onclick="resendOTP()" id="resendBtn">Resend Code</a>
                    <div id="toast" class="toast-notification">
                        <i class="fas fa-paper-plane"></i> OTP has been resent successfully!
                    </div>
                </footer>
            </div>
        </div>
    </div>

    <script>
        function resendOTP() {
            const btn = document.getElementById('resendBtn');
            const toast = document.getElementById('toast');
            
            // Prevent multiple clicks
            btn.style.pointerEvents = 'none';
            btn.style.opacity = '0.5';
            btn.innerText = 'Sending...';

            // Simulate or call resend logic
            setTimeout(() => {
                toast.classList.add('show');
                btn.innerText = 'Resend Code';
                btn.style.pointerEvents = 'auto';
                btn.style.opacity = '1';
                
                setTimeout(() => {
                    toast.classList.remove('show');
                }, 3000);
            }, 800);
        }
    </script>
</body>
</html>
